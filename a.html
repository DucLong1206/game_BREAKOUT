<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BREAKOUT: Phòng Thủ Trái Đất</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>

<div id="hud">
  <strong>⚡ BREAKOUT: PHÒNG THỦ TRÁI ĐẤT</strong><br>
  <span id="status">Đang khởi động hệ thống...</span><br>
  <span id="info"></span>
</div>

<video id="camPreview" autoplay playsinline muted></video>

<div id="legend">
  <span style="background:#3399ff"></span>Plasma L1 — 1 lần<br>
  <span style="background:#ff4444"></span>Plasma L2 — 2 lần<br>
  <span style="background:#ff8800"></span>Plasma L3 — 2 lần<br>
  <span style="background:#22cc55"></span>Plasma L4 — 3 lần<br>
  <span style="background:#ff55cc"></span>Plasma L5 — 3 lần<br>
  <span style="background:#aa00ff"></span>Plasma L6 — 4 lần<br>
  <span style="background:#ffdd00"></span>Plasma L7 — 5 lần<br>
  <span style="background:#ff0033"></span>⚡ Boss Shield<br>
  <span style="background:#ffd700;border:1px solid #ffd700"></span>Viền vàng = item
</div>

<!-- Dialog overlay -->
<div id="dialog">
  <div id="dialog-box">
    <div id="dialog-speaker">— CHỈ HUY NOVA —</div>
    <span id="dialog-portrait">🚀</span>
    <div id="dialog-text"></div>
    <div id="dialog-progress-wrap">
      <div id="dialog-progress-bar"></div>
    </div>
    <div id="dialog-continue">[ GIỮ 👌 ĐỂ TIẾP TỤC  ·  DƠ 🖐 ĐỂ BỎ QUA ]</div>
  </div>
</div>

<div id="scanlines"></div>

<!-- Audio elements -->
<audio id="bgMusic" loop preload="auto">
  <source src="sounds/background.mp3" type="audio/mpeg">
  <source src="sounds/background.ogg" type="audio/ogg">
  Your browser does not support the audio element.
</audio>

<audio id="hitBrickSound" preload="auto">
  <source src="sounds/hit_brick.wav" type="audio/wav">
  <source src="sounds/hit_brick.mp3" type="audio/mpeg">
</audio>

<audio id="hitPaddleSound" preload="auto">
  <source src="sounds/hit_paddle.wav" type="audio/wav">
  <source src="sounds/hit_paddle.mp3" type="audio/mpeg">
</audio>

<audio id="hitBossSound" preload="auto">
  <source src="sounds/hit_boss.wav" type="audio/wav">
  <source src="sounds/hit_boss.mp3" type="audio/mpeg">
</audio>

<audio id="powerUpSound" preload="auto">
  <source src="sounds/powerup.wav" type="audio/wav">
  <source src="sounds/powerup.mp3" type="audio/mpeg">
</audio>

<script src="game.js"></script>
</body>
</html>
